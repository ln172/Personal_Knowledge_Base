---
layout: default
---
{% assign sorted_notes = site.notes | sort: "date" | reverse %}
<section class="hero hero--page">
  <div class="hero__copy">
    <p class="eyebrow">Tag Atlas</p>
    <h1>把标签当作你知识体系的目录。</h1>
    <p class="hero__lead">
      新增标签时不需要改任何模板，只要在日记 Markdown 的 `tags` 字段里写上新标签，页面会自动汇总。
    </p>
  </div>
</section>

<section class="control-panel">
  <div class="control-panel__head">
    <div>
      <p class="eyebrow">Browse Tags</p>
      <h2>按标签聚合日记</h2>
    </div>
    <button class="button button--ghost" type="button" data-clear-filters hidden>清空筛选</button>
  </div>
  <div class="search-row">
    <label class="search-row__field" for="tag-search">
      <span>关键词</span>
      <input id="tag-search" type="search" placeholder="搜索标签、标题或摘要" data-note-search>
    </label>
    <div>
      <span class="search-row__label">标签</span>
      <div class="tag-filter" data-tag-filter></div>
    </div>
  </div>
  <p class="result-text" data-results-label>共 {{ sorted_notes | size }} 篇日记可参与聚合</p>
</section>

<section class="tag-directory" data-tag-sections></section>
<p class="empty-state" data-empty-state hidden>没有找到符合当前筛选条件的标签或日记。</p>

<script id="notes-data" type="application/json">
[
  {% for note in sorted_notes %}
    {
      "title": {{ note.title | jsonify }},
      "url": {{ note.url | relative_url | jsonify }},
      "date": {{ note.date | date: "%Y-%m-%d" | jsonify }},
      "summary": {{ note.summary | default: note.excerpt | strip_html | strip_newlines | normalize_whitespace | truncate: 160 | jsonify }},
      "tags": {{ note.tags | default: empty | jsonify }}
    }{% unless forloop.last %},{% endunless %}
  {% endfor %}
]
</script>
