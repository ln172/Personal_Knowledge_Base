---
layout: default
---
<article class="note-page">
  <div class="note-page__head">
    <p class="eyebrow">Study Note</p>
    <h1>{{ page.title }}</h1>
    <div class="note-page__meta">
      <span>{{ page.date | date: "%Y 年 %m 月 %d 日" }}</span>
      <span>{{ page.tags | size | default: 0 }} 个标签</span>
    </div>
    {% if page.summary %}
      <p class="note-page__summary">{{ page.summary }}</p>
    {% endif %}
    <div class="tag-list">
      {% for tag in page.tags %}
        <a class="tag-pill" href="{{ site.baseurl }}/tags/?tag={{ tag | uri_escape }}">#{{ tag }}</a>
      {% endfor %}
    </div>
  </div>

  <div class="note-content">
    {{ content }}
  </div>

  <div class="note-page__footer">
    <a class="button button--ghost" href="{{ site.baseurl }}/">返回首页</a>
    <a class="button button--ghost" href="{{ site.baseurl }}/tags/">查看全部标签</a>
  </div>
</article>
